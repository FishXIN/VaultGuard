name: Bug Report
description: Report a reproducible defect in VaultGuard
title: "[Bug] "
labels:
  - type: bug
  - priority: p1
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please provide a reproducible case and version details.
  - type: input
    id: version
    attributes:
      label: Version
      description: Which released version is affected?
      placeholder: v1.2.5
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - Windows
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      placeholder: |
        1. Open Settings
        2. Toggle ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs Or Screenshots
      description: Paste traceback, logs, or screenshots if available.
